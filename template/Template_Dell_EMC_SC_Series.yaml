zabbix_export:
  version: "7.4"
  template_groups:
    - uuid: d0140debe2984e7cba4a5b4109071713
      name: Templates/Storage
  templates:
    - uuid: f15574dc339c4e31a50679e3759eb77f
      template: Template Dell EMC SC Series
      name: Template Dell EMC SC Series
      description: Minimal template for Dell EMC SC Series
      groups:
        - name: Templates/Storage
      macros:
        - macro: "{$SNMP_COMMUNITY}"
          value: public
      valuemaps:
        - uuid: 8c9d7d0fb5f548c9a111111111111001
          name: Dell SC Global Status
          mappings:
            - value: '1'
              newvalue: Other
            - value: '2'
              newvalue: Unknown
            - value: '3'
              newvalue: OK
            - value: '4'
              newvalue: Warning
            - value: '5'
              newvalue: Critical
            - value: '6'
              newvalue: Nonrecoverable  

      items:
        - uuid: 7edd8ab9ff0a4bd1b2b5cd7b400b6979
